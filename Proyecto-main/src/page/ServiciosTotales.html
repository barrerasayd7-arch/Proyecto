<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Servicios - UniServicios</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Templates/styleHome.css">
</head>
<body>

    <nav class="navbar-custom">
        <div class="container">
            <a href="HomePrincipal.html" class="navbar-brand-custom">UniService</a>
            <div class="navbar-links">
                <a href="HomePrincipal.html#inicio" class="nav-link-custom">Inicio</a>
                <a href="HomePrincipal.html#buscar" class="nav-link-custom activo">Buscar servicios</a>
                <a href="HomePrincipal.html#publicar servicio" class="nav-link-custom">Publicar</a>
                <a href="HomePrincipal.html#mis-servicios" class="nav-link-custom">Mis servicios</a>
                <a href="perfil.html" class="nav-link-custom">Perfil</a>
                <a href="HomeGuest.html" class="nav-link-custom nav-Cerrar">Cerrar Sesión</a>
            </div>
        </div>
    </nav>

    <header class="seccion" style="padding-bottom: 0;">
        <div class="container text-center">
            <p class="label-seccion">Marketplace Universitario</p>
            <h1 style="font-size: 2.5rem;">Todos los <span class="acento">servicios</span></h1>
            
            <div class="caja-formulario" style="max-width: 700px; margin: 30px auto;">
                <input type="text" id="input-busqueda-global" class="form-input" 
                       placeholder="¿Qué necesitas hoy? (Ej: Álgebra, Logo, Habitación...)"
                       onkeyup="ejecutarFiltro()">
            </div>
        </div>
    </header>

    <div class="chips-bar">
        <div class="container chips-container" id="filtros-categorias">
            <button class="chip activo" onclick="filtrarPorCategoria('todos', this)">🌐 Todos</button>
            <button class="chip" onclick="filtrarPorCategoria('tutorias', this)">📚 Tutorías</button>
            <button class="chip" onclick="filtrarPorCategoria('ensayos', this)">✍️ Ensayos</button>
            <button class="chip" onclick="filtrarPorCategoria('proyectos', this)">🗂️ Proyectos</button>
            <button class="chip" onclick="filtrarPorCategoria('programacion', this)">💻 Programación</button>
            <button class="chip" onclick="filtrarPorCategoria('diseno', this)">🎨 Diseño</button>
            <button class="chip" onclick="filtrarPorCategoria('arriendo', this)">🏠 Arriendo</button>
        </div>
    </div>

    <section class="seccion">
        <div class="container">
            <div class="sort-bar">
                <p class="texto-muted">Resultados: <strong id="total-resultados" class="texto-claro">0</strong></p>
            </div>

            <div class="cards-grid" id="contenedor-explorar">
                </div>
        </div>
    </section>


    <script>
    //Verificar si el usuario está logueado al cargar la página
document.addEventListener("DOMContentLoaded", () => {
  const logueado = localStorage.getItem("logueado");
  if (logueado !== "true") {
    // Si no está logueado, redirige al login
    window.location.href = "login.html";
  }
});
</script>

<script>
    // Manejar cierre de sesión (Borrar variable de login y redirigir a página pública)
document.addEventListener("DOMContentLoaded", () => {
  const cerrarSesion = document.querySelector(".nav-Cerrar");
  cerrarSesion.addEventListener("click", function(e) {
    e.preventDefault();                             // evita que el link vaya directo
    localStorage.removeItem("logueado");            // borra la variable de login
    window.location.href = "HomeGuest.html";        // redirige a la página pública
  });
});
</script>

    <script src="../Js/explorarServicios.js"></script>
</body>
</html>
